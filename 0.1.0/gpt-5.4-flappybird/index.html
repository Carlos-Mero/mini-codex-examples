<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell">
        <canvas id="game" width="420" height="640" aria-label="Flappy Bird game"></canvas>

        <div class="hud">
          <div class="scoreboard">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="scoreboard">
            <span>Best</span>
            <strong id="best-score">0</strong>
          </div>
        </div>

        <div id="message" class="overlay visible">
          <h1>Flappy Bird</h1>
          <p>Press <kbd>Space</kbd>, <kbd>↑</kbd>, or tap/click to flap.</p>
          <p>Avoid the pipes and beat your best score.</p>
          <button id="start-btn" type="button">Start Game</button>
        </div>

        <div id="game-over" class="overlay hidden">
          <h2>Game Over</h2>
          <p>Your score: <strong id="final-score">0</strong></p>
          <button id="restart-btn" type="button">Play Again</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
